<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Innovation Intelligence Book</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        book: {
                            paper: '#fcfcfc',
                            darkPaper: '#1e293b',
                            cover: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'book-left': '-10px 10px 30px rgba(0,0,0,0.1), inset -2px 0 10px rgba(0,0,0,0.05)',
                        'book-right': '10px 10px 30px rgba(0,0,0,0.1), inset 2px 0 10px rgba(0,0,0,0.05)',
                        'book-mobile': '0 10px 30px rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        .a4-page {
            aspect-ratio: 1 / 1.414;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
        }
        .a4-page::-webkit-scrollbar { width: 4px; }
        .a4-page::-webkit-scrollbar-track { background: transparent; }
        .a4-page::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .a4-page::-webkit-scrollbar-thumb { background-color: #475569; }

        .binding-left {
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%);
        }
        .dark .binding-left {
            background: linear-gradient(to right, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%);
        }
        .binding-right {
            background: linear-gradient(to left, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%);
        }
        .dark .binding-right {
            background: linear-gradient(to left, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%);
        }

        .prose h1 { font-size: 1.875rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; }
        .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .dark .prose h1, .dark .prose h2 { color: #f8fafc; border-color: #334155; }
        .dark .prose p, .dark .prose li { color: #cbd5e1; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            nav, .no-print, #book-wrapper, #filter-bar { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
            #print-wrapper { display: block !important; width: 100%; background: white; }
            .print-page {
                page-break-after: always; break-after: page;
                width: 210mm; height: 296mm; box-sizing: border-box;
                padding: 12mm 15mm; overflow: hidden;
                background: white !important; display: flex; flex-direction: column;
            }
            .print-page * { color: black !important; }
            .print-page .bg-slate-800, .print-page .bg-slate-900 { background-color: #f8fafc !important; border: 1px solid #e2e8f0; }
            .print-page .text-white { color: #0f172a !important; }
            .print-page .flex-grow { flex-grow: 1 !important; flex-shrink: 0 !important; }
            .print-leaflet-target { height: 180px !important; border: 1px solid #cbd5e1 !important; border-radius: 8px; width: 100%; display: block; }
            .print-echarts-target { height: 240px !important; width: 100%; display: block; }
            .print-page .overflow-y-auto { overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors font-sans antialiased min-h-screen flex flex-col">

    <div id="print-loading" class="fixed inset-0 bg-slate-900/90 z-[9999] hidden flex-col items-center justify-center text-white backdrop-blur-sm">
        <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4 text-blue-400"></i>
        <h2 class="text-2xl font-bold mb-2">Menyiapkan Dokumen PDF...</h2>
        <p class="text-slate-300 text-center max-w-md">Membangun halaman, merender peta & grafik...</p>
    </div>

    <div id="print-wrapper" class="hidden"></div>

    <!-- Navbar & Filter -->
    <nav class="fixed top-0 w-full bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 z-50 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center gap-3">
                <i data-lucide="book-open" class="text-blue-600 dark:text-blue-400 w-6 h-6"></i>
                <span class="font-bold text-lg tracking-tight hidden sm:block">Intelligence Book</span>
                <select id="toc-dropdown" class="text-xs border rounded p-1.5 min-w-[140px] bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 outline-none cursor-pointer">
                    <option value="" disabled selected>Daftar Isi...</option>
                </select>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
                <span id="page-indicator" class="text-xs font-medium text-slate-500 dark:text-slate-400 font-mono hidden md:inline-block w-24 text-right">Page 1 / ?</span>
                
                <button onclick="printAllAsPDF()" class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 transition-all flex items-center gap-2 border border-indigo-200 dark:border-indigo-800">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                    <span class="text-xs font-bold uppercase hidden md:inline-block">Cetak PDF</span>
                </button>

                <div class="flex bg-slate-100 dark:bg-slate-900 rounded-lg p-1">
                    <button onclick="prevPage()" class="p-2 rounded hover:bg-white dark:hover:bg-slate-700 transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <button onclick="nextPage()" class="p-2 rounded hover:bg-white dark:hover:bg-slate-700 transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>

                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        <!-- Filter Bar -->
        <div id="filter-bar" class="px-4 pb-2 pt-1 flex flex-wrap gap-2 items-center border-t border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-800/80">
            <input type="text" id="search-title" placeholder="Cari judul..." class="text-xs p-1.5 rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 w-36 md:w-48">
            <select id="filter-category" multiple size="1" class="text-xs p-1.5 rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 w-36 md:w-48">
                <option value="">Semua Kategori</option>
            </select>
            <select id="filter-country" multiple size="1" class="text-xs p-1.5 rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 w-36 md:w-48">
                <option value="">Semua Negara</option>
            </select>
            <button id="reset-filter" class="text-xs px-2 py-1.5 bg-slate-200 dark:bg-slate-700 rounded hover:bg-slate-300 transition">Reset</button>
            <span id="filter-count" class="text-xs text-slate-500 ml-auto">0 inovasi</span>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-8 pt-28 pb-12 w-full no-print">
        <div id="book-wrapper" class="relative flex w-full max-w-6xl justify-center items-stretch gap-0 sm:gap-1">
            <div id="page-left" class="hidden md:block w-1/2 bg-book-paper dark:bg-book-darkPaper shadow-book-left rounded-l-md relative a4-page">
                <div class="absolute inset-y-0 right-0 w-12 binding-left pointer-events-none z-10"></div>
                <div class="p-8 lg:p-12 h-full flex flex-col relative" id="content-left"></div>
            </div>
            <div id="page-right" class="w-full md:w-1/2 max-w-md md:max-w-none bg-book-paper dark:bg-book-darkPaper shadow-book-mobile md:shadow-book-right rounded-md md:rounded-l-none md:rounded-r-md relative a4-page">
                <div class="hidden md:block absolute inset-y-0 left-0 w-12 binding-right pointer-events-none z-10"></div>
                <div class="p-6 sm:p-8 lg:p-12 h-full flex flex-col relative" id="content-right"></div>
            </div>
        </div>
    </main>

    <script>
        // --- State Variables ---
        let allInnovations = [];      // original data.json
        let resumeData = null;        // resume.json (ambil terbaru)
        let filteredInnovations = [];
        let currentPageIndex = 0;
        let isMobile = window.innerWidth < 768;
        let mapInstances = {};
        let chartInstances = {};
        let printMapInst = {}, printChartInst = {};
        const TOTAL_STATIC_PAGES = 4;  // cover, report, metrics, (blank) di kiri? kita pakai 3 halaman statis + 1 kosong opsional
        
        // Helper: ambil negara string
        function getCountryString(loc) {
            if (!loc) return 'Lainnya';
            if (typeof loc.country === 'string') return loc.country.split(';')[0].trim();
            if (Array.isArray(loc.country)) return loc.country[0];
            return 'Lainnya';
        }

        // Filter logic
        function applyFilters() {
            const searchTerm = document.getElementById('search-title')?.value.toLowerCase() || '';
            const selectedCategory = document.getElementById('filter-category')?.value || '';
            const selectedCountry = document.getElementById('filter-country')?.value || '';
            
            filteredInnovations = allInnovations.filter(inn => {
                if (searchTerm && !inn.title.toLowerCase().includes(searchTerm)) return false;
                if (selectedCategory && !(inn.category || []).some(cat => cat === selectedCategory)) return false;
                if (selectedCountry && getCountryString(inn.location) !== selectedCountry) return false;
                return true;
            });
            document.getElementById('filter-count').innerText = `${filteredInnovations.length} inovasi`;
            // Reset halaman
            currentPageIndex = isMobile ? 1 : 0;
            renderBook();
            rebuildDropdown();
        }

        function rebuildDropdown() {
            const dropdown = document.getElementById('toc-dropdown');
            let html = `<option value="" disabled selected>Daftar Isi...</option>
                        <option value="1">Sampul Depan</option>
                        <option value="2">Laporan Eksekutif</option>
                        <option value="3">Metrik Global</option>`;
            let grouped = {};
            filteredInnovations.forEach((item, idx) => {
                let country = getCountryString(item.location);
                if(!grouped[country]) grouped[country] = [];
                grouped[country].push({ title: item.title, idx: idx });
            });
            for(let country in grouped) {
                html += `<optgroup label="📍 ${country}">`;
                grouped[country].forEach(item => {
                    let pageIdx = TOTAL_STATIC_PAGES + (item.idx * 2);
                    html += `<option value="${pageIdx}">${item.title}</option>`;
                });
                html += `</optgroup>`;
            }
            dropdown.innerHTML = html;
        }

        // --- Load JSON & Build dynamic report ---
        async function loadData() {
            try {
                const [dataRes, resumeRes] = await Promise.all([
                    fetch('data.json'),
                    fetch('resume.json')
                ]);
                if (!dataRes.ok) throw new Error('data.json gagal dimuat');
                if (!resumeRes.ok) throw new Error('resume.json gagal dimuat');
                allInnovations = await dataRes.json();
                const resumeArr = await resumeRes.json();
                resumeData = resumeArr[resumeArr.length - 1]; // ambil snapshot terbaru
                filteredInnovations = [...allInnovations];
                document.getElementById('filter-count').innerText = `${filteredInnovations.length} inovasi`;
                
                // populate filter options
                const categoriesSet = new Set();
                const countriesSet = new Set();
                allInnovations.forEach(inn => {
                    (inn.category || []).forEach(c => categoriesSet.add(c));
                    countriesSet.add(getCountryString(inn.location));
                });
                const catSelect = document.getElementById('filter-category');
                catSelect.innerHTML = '<option value="">Semua Kategori</option>' + Array.from(categoriesSet).map(c => `<option value="${c}">${c}</option>`).join('');
                const countrySelect = document.getElementById('filter-country');
                countrySelect.innerHTML = '<option value="">Semua Negara</option>' + Array.from(countriesSet).map(c => `<option value="${c}">${c}</option>`).join('');
                
                rebuildDropdown();
                renderBook();
            } catch(e) {
                console.error(e);
                document.getElementById('content-right').innerHTML = `<div class="p-4 text-red-500">Gagal memuat data. Pastikan data.json dan resume.json tersedia.</div>`;
            }
        }

        // Generate report HTML from data & resume
        function buildDynamicReportHtml() {
            if (!resumeData) return '<p>Memuat laporan...</p>';
            const summary = resumeData.global_summary || {};
            const total = allInnovations.length;
            const grassroots = summary.grassroots_percentage || 0;
            const categories = (resumeData.top_categories || []).slice(0,5);
            const risks = (resumeData.risk_distribution || []);
            const hidden = allInnovations.filter(i => i.hidden_gem === true).slice(0,4);
            return `
                <div class="prose dark:prose-invert max-w-none text-sm">
                    <h1>Laporan Intelijen Inovasi</h1>
                    <p><strong>Periode:</strong> ${resumeData.report_metadata?.period || 'Q1 2026'} | <strong>Total Inovasi:</strong> ${total}</p>
                    <p>Inovasi tingkat <strong>Grassroots</strong> mendominasi dengan <strong>${grassroots}%</strong>, menunjukkan ketangguhan komunitas lokal dalam beradaptasi.</p>
                    <h2>📊 Kategori Teratas</h2>
                    <ul>${categories.map(c => `<li><strong>${c.category}</strong> — ${c.count} inovasi</li>`).join('')}</ul>
                    <h2>⚠️ Distribusi Risiko</h2>
                    <ul>${risks.map(r => `<li>${r.level.toUpperCase()}: ${r.count} kasus</li>`).join('')}</ul>
                    <h2>💎 Hidden Gems</h2>
                    <ul>${hidden.map(h => `<li><strong>${h.title}</strong> — ${h.location?.country || 'Global'}</li>`).join('')}</ul>
                    <p><em>Laporan dihasilkan secara dinamis dari data.json dan resume.json.</em></p>
                </div>
            `;
        }

        function buildResumeMetricsHtml() {
            if (!resumeData) return '<p>Memuat metrik...</p>';
            const summary = resumeData.global_summary || {};
            const cats = (resumeData.top_categories || []).slice(0,6);
            const risks = (resumeData.risk_distribution || []);
            return `
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-center"><p class="text-[10px] uppercase font-bold">Total Inovasi</p><p class="text-2xl font-black">${summary.total_innovations || allInnovations.length}</p></div>
                        <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-center"><p class="text-[10px] uppercase font-bold">Grassroots</p><p class="text-2xl font-black text-emerald-500">${summary.grassroots_percentage || 0}%</p></div>
                    </div>
                    <div><h4 class="text-xs font-bold uppercase mb-2 border-b pb-1">Top Kategori</h4>${cats.map(c => `<div class="flex justify-between text-sm mb-1"><span>${c.category}</span><span class="font-bold">${c.count}</span></div>`).join('')}</div>
                    <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl"><h4 class="text-xs font-bold uppercase mb-2">Distribusi Risiko</h4>${risks.map(r => `<div class="flex justify-between text-sm"><span class="capitalize">${r.level}</span><span>${r.count}</span></div>`).join('')}</div>
                </div>
            `;
        }

        // Page builders (similar to original, but using filteredInnovations)
        function getTotalPages() {
            return TOTAL_STATIC_PAGES + (filteredInnovations.length * 2);
        }

        function getPageHtml(index, isPrint = false) {
            if (index < 0 || index >= getTotalPages()) return '';
            if (index === 0) return buildCoverPage(isPrint);
            if (index === 1) return `<div class="flex flex-col h-full overflow-y-auto pr-2"><div class="prose dark:prose-invert max-w-none">${buildDynamicReportHtml()}</div></div>`;
            if (index === 2) return `<div class="flex flex-col h-full overflow-y-auto pr-2">${buildResumeMetricsHtml()}</div>`;
            if (index === 3 && isMobile) return buildBlankPage(isPrint); // optional blank
            
            let dataIndex = Math.floor((index - TOTAL_STATIC_PAGES) / 2);
            let item = filteredInnovations[dataIndex];
            if (!item) return `<div class="flex items-center justify-center h-full"><p class="text-slate-400">Tidak ada data</p></div>`;
            let isLeftPage = (index % 2 === 0);
            return isLeftPage ? buildElementMapPage(item, dataIndex, isPrint) : buildElementChartPage(item, dataIndex, isPrint);
        }

        function buildCoverPage(isPrint) {
            return `<div class="flex flex-col items-center justify-center h-full text-center space-y-6"><div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center"><i data-lucide="globe-2" class="text-white w-12 h-12"></i></div><h1 class="text-4xl font-black uppercase tracking-wider">Innovation<br/>Intelligence<br/>Radar</h1><div class="w-16 h-1 bg-blue-500 rounded-full"></div><p class="text-slate-500 font-mono text-sm">Digital Briefing Book</p><p class="text-xs text-slate-400 mt-auto pt-12">Vol. 1 — 2026</p></div>`;
        }
        function buildBlankPage(isPrint) { return `<div class="flex flex-col items-center justify-center h-full opacity-40"><i data-lucide="book-dashed" class="w-12 h-12 mb-4"></i><p class="text-xs text-center">Halaman kosong</p></div>`; }

        function buildElementMapPage(item, idx, isPrint) {
            const mapId = `map-${idx}-${isPrint ? 'print' : 'screen'}`;
            const lat = item.location?.lat || 0;
            const lon = item.location?.lon || 0;
            const badges = (item.category || []).map(c => `<span class="px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded text-[10px] font-medium">${c}</span>`).join('');
            const levelBadge = `<span class="px-2 py-1 bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 rounded text-[10px] font-bold uppercase">${item.innovation_level || 'grassroots'}</span>`;
            const gemBadge = item.hidden_gem ? `<span class="px-2 py-1 bg-amber-100 text-amber-700 rounded flex items-center gap-1 text-[10px]"><i data-lucide="gem" class="w-3 h-3"></i> Hidden Gem</span>` : '';
            return `
                <div class="flex flex-col h-full overflow-y-auto pr-1">
                    <div class="flex flex-wrap gap-2 mb-3">${levelBadge} ${gemBadge}</div>
                    <h2 class="text-xl font-bold mb-2">${item.title}</h2>
                    <div class="flex flex-wrap gap-1 mb-3">${badges}</div>
                    <div id="${mapId}" class="w-full h-40 rounded-xl bg-slate-200 dark:bg-slate-800 mb-4 border relative z-0" data-lat="${lat}" data-lon="${lon}"></div>
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl text-xs space-y-2">
                        <div><strong>Sumber Pengetahuan:</strong> ${(item.origin?.knowledge_source || []).join(', ') || '-'}</div>
                        <div><strong>Lokasi:</strong> ${item.location?.region || '-'}, ${getCountryString(item.location)}</div>
                        <div><strong>Biaya:</strong> ${item.replicability?.cost_level || 'N/A'} | <strong>Kesulitan:</strong> ${item.replicability?.difficulty || 'N/A'}</div>
                        ${item.source_url ? `<div><a href="${item.source_url}" target="_blank" class="text-blue-600 break-all">🔗 Sumber</a></div>` : ''}
                    </div>
                </div>
            `;
        }
        function buildElementChartPage(item, idx, isPrint) {
            const chartId = `chart-${idx}-${isPrint ? 'print' : 'screen'}`;
            const riskScore = item.risk_assessment?.risk_score || 0;
            const riskTypes = (item.risk_assessment?.risk_type || []).join(', ');
            const processText = item.process?.how_it_works || (item.process?.step_by_step ? item.process.step_by_step.slice(0,3).join('; ') : 'Tidak ada data proses');
            return `
                <div class="flex flex-col h-full overflow-y-auto pr-1">
                    <h3 class="text-sm font-bold uppercase border-b pb-1 mb-2">Analisis & Risiko</h3>
                    <p class="text-xs italic mb-3 bg-slate-50 dark:bg-slate-800 p-2 rounded">${item.summary || ''}</p>
                    <div id="${chartId}" class="w-full h-44 mb-3 echarts-target" data-prio="${item.priority_score||0}" data-risk="${riskScore*10}" data-impact="${item.impact?.scale === 'high' ? 90 : 50}" data-cost="${item.replicability?.cost_level === 'low' ? 20 : 70}" data-diff="${item.replicability?.difficulty === 'easy' ? 20 : 70}"></div>
                    <div class="border-l-4 border-red-400 pl-2 text-xs"><strong>Skor Risiko:</strong> ${riskScore}/10<br/>${riskTypes ? `Jenis: ${riskTypes}` : ''}<br/>${item.risk_assessment?.explanation || ''}</div>
                    <div class="mt-2 text-xs"><strong>Proses:</strong> ${processText.substring(0,150)}...</div>
                </div>
            `;
        }

        // Render & Navigation
        function renderBook() {
            const leftEl = document.getElementById('content-left');
            const rightEl = document.getElementById('content-right');
            if (isMobile) {
                rightEl.innerHTML = getPageHtml(currentPageIndex, false) || '';
                leftEl.innerHTML = '';
            } else {
                const leftIndex = Math.floor(currentPageIndex / 2) * 2;
                leftEl.innerHTML = getPageHtml(leftIndex, false) || '<div class="flex items-center justify-center h-full"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
                rightEl.innerHTML = getPageHtml(leftIndex + 1, false) || '<div class="flex items-center justify-center h-full"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
            }
            lucide.createIcons();
            setTimeout(() => {
                initVisualizations('.leaflet-target', '.echarts-target', mapInstances, chartInstances, false);
            }, 50);
            updateIndicator();
        }
        function updateIndicator() {
            const total = getTotalPages();
            let display = isMobile ? currentPageIndex : (Math.floor(currentPageIndex/2)*2);
            document.getElementById('page-indicator').innerText = `Halaman ${display} / ${total-1}`;
        }
        function nextPage() { let step = isMobile ? 1 : 2; if (currentPageIndex + step < getTotalPages()) { currentPageIndex += step; renderBook(); } }
        function prevPage() { let step = isMobile ? 1 : 2; if (currentPageIndex - step >= 0) { currentPageIndex -= step; if (isMobile && currentPageIndex === 0) currentPageIndex = 1; renderBook(); } }
        function jumpToPage(val) { if(!val) return; currentPageIndex = parseInt(val); if (!isMobile && currentPageIndex % 2 !== 0) currentPageIndex--; renderBook(); document.getElementById('toc-dropdown').selectedIndex = 0; }

        // Visualizations init
        function initVisualizations(mapClass, chartClass, mapsObj, chartsObj, isPrint) {
            document.querySelectorAll(mapClass).forEach(el => {
                const id = el.id;
                const lat = parseFloat(el.dataset.lat), lon = parseFloat(el.dataset.lon);
                if (id && !mapsObj[id] && !isNaN(lat)) {
                    const map = L.map(id, { zoomControl: false, scrollWheelZoom: false }).setView([lat, lon], 5);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
                    L.marker([lat, lon], { icon: L.divIcon({ html: '<div class="w-3 h-3 bg-blue-500 rounded-full border border-white"></div>', iconSize: [12,12] }) }).addTo(map);
                    mapsObj[id] = map;
                }
            });
            document.querySelectorAll(chartClass).forEach(el => {
                const id = el.id;
                if (id && !chartsObj[id]) {
                    const chart = echarts.init(el);
                    const prio = parseFloat(el.dataset.prio) || 50;
                    const risk = parseFloat(el.dataset.risk) || 50;
                    const impact = parseFloat(el.dataset.impact) || 50;
                    const cost = parseFloat(el.dataset.cost) || 50;
                    const diff = parseFloat(el.dataset.diff) || 50;
                    chart.setOption({
                        radar: { indicator: [{name:'Priority',max:100},{name:'Impact',max:100},{name:'Risk',max:100},{name:'Cost',max:100},{name:'Difficulty',max:100}], radius:'60%', center:['50%','55%'], axisName: { fontSize:9 } },
                        series: [{ type:'radar', data: [{ value: [prio, impact, risk, cost, diff], areaStyle: { color: 'rgba(59,130,246,0.3)' }, lineStyle: { width:2 }, itemStyle: { color:'#3b82f6' } }] }]
                    });
                    chartsObj[id] = chart;
                }
            });
        }

        async function printAllAsPDF() {
            const loading = document.getElementById('print-loading');
            const printWrapper = document.getElementById('print-wrapper');
            loading.classList.remove('hidden'); loading.classList.add('flex');
            await new Promise(r => setTimeout(r, 100));
            let fullHtml = '';
            for(let i=0; i<getTotalPages(); i++) {
                if(i===0) continue;
                fullHtml += `<div class="print-page">${getPageHtml(i, true)}</div>`;
            }
            printWrapper.innerHTML = fullHtml;
            lucide.createIcons();
            initVisualizations('.print-leaflet-target', '.print-echarts-target', printMapInst, printChartInst, true);
            await new Promise(r => setTimeout(r, 1500));
            window.print();
            printWrapper.innerHTML = '';
            loading.classList.add('hidden'); loading.classList.remove('flex');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark'); localStorage.theme = 'light';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            } else {
                document.documentElement.classList.add('dark'); localStorage.theme = 'dark';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
            renderBook();
        }
        function checkTheme() {
            if (localStorage.theme === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').setAttribute('data-lucide', 'sun'); }
            else { document.documentElement.classList.remove('dark'); document.getElementById('theme-icon').setAttribute('data-lucide', 'moon'); }
        }

        // Event listeners
        window.addEventListener('resize', () => { let newMobile = window.innerWidth < 768; if (newMobile !== isMobile) { isMobile = newMobile; if (!isMobile && currentPageIndex%2!==0 && currentPageIndex>0) currentPageIndex--; renderBook(); } });
        document.getElementById('search-title')?.addEventListener('input', () => applyFilters());
        document.getElementById('filter-category')?.addEventListener('change', () => applyFilters());
        document.getElementById('filter-country')?.addEventListener('change', () => applyFilters());
        document.getElementById('reset-filter')?.addEventListener('click', () => { document.getElementById('search-title').value = ''; document.getElementById('filter-category').value = ''; document.getElementById('filter-country').value = ''; applyFilters(); });
        document.getElementById('toc-dropdown')?.addEventListener('change', (e) => jumpToPage(e.target.value));
        
        checkTheme();
        loadData();
    </script>
</body>
</html>
