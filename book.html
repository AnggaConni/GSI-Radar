<!DOCTYPE html>
<html lang="id">
<head>

    <!-- Tailwind CSS -->

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        book: {
                            paper: '#fcfcfc',
                            darkPaper: '#1e293b',
                            cover: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'book-left': '-10px 10px 30px rgba(0,0,0,0.1), inset -2px 0 10px rgba(0,0,0,0.05)',
                        'book-right': '10px 10px 30px rgba(0,0,0,0.1), inset 2px 0 10px rgba(0,0,0,0.05)',
                        'book-mobile': '0 10px 30px rgba(0,0,0,0.1)',
                    }
                }
            }
        }

    <style>
        /* A4 Aspect Ratio 1 : 1.414 */
        .a4-page {
            aspect-ratio: 1 / 1.414;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            background-color: var(--tw-bg-opacity, 1);
        }
        
        .a4-page::-webkit-scrollbar {
            width: 4px;
        }
        
        .a4-page::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .a4-page::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .dark .a4-page::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        /* Book Binding Effect */
        .binding-left {
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%);
        }
        .dark .binding-left {
            background: linear-gradient(to right, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%);
        }
        
        .binding-right {
            background: linear-gradient(to left, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%);
        }
        .dark .binding-right {
            background: linear-gradient(to left, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%);
        }

        /* Markdown Styles */
        .prose h1 { font-size: 1.875rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; }
        .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; color: #1e293b; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        
        .dark .prose h1, .dark .prose h2 { color: #f8fafc; border-color: #334155; }
        .dark .prose p, .dark .prose li { color: #cbd5e1; }
        
        .page-transition {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        /* --- PRINT STYLES --- */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: white !important;
                color: black !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            nav, .no-print {
                display: none !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
                display: block !important;
            }
            #book-wrapper {
                display: block !important;
                max-width: 100% !important;
                width: 100% !important;
                gap: 0 !important;
            }
            .a4-page {
                width: 100% !important;
                max-width: 100% !important;
                height: 100vh !important;
                aspect-ratio: auto !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                page-break-after: always !important;
                break-after: page !important;
                overflow: hidden !important;
                display: block !important;
                transform: none !important;
            }
            /* Sembunyikan efek bayangan jilid saat dicetak */
            .binding-left, .binding-right { display: none !important; }
            
            /* Paksa dark mode elements menjadi terang untuk cetak (opsional) */
            .dark .a4-page { background: white !important; color: black !important; }
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 font-sans antialiased min-h-screen flex flex-col">

        const fallbackResume = [{

        const fallbackReport = `# Global Innovation Intelligence Report
**Period:** Q1 2026 | **Generated:** 2026-03-22
---
## 🌍 Executive Summary

        // --- State Variables ---
        let currentPageIndex = 0; 
        let isMobile = window.innerWidth < 768;
        let mapInstances = {};
        let chartInstances = {};
        let globalDataArr = []; 
        let precompiled = { reportHtml: "", resumeHtml: "" };
        const TOTAL_STATIC_PAGES = 4;

        // --- Core Application Logic ---

        async function initApp() {
            lucide.createIcons();
            checkTheme();
            
            window.addEventListener('resize', () => {
                const newIsMobile = window.innerWidth < 768;
                if (newIsMobile !== isMobile) {
                    isMobile = newIsMobile;
                    if (!isMobile && currentPageIndex % 2 !== 0) {
                        currentPageIndex--;
                    }
                    renderBook();
                }
            });

            let finalReport = fallbackReport;
            let finalResume = fallbackResume;
            globalDataArr = fallbackData;

            try {
                const [reqReport, reqResume, reqData] = await Promise.all([
                    fetch('report.md'), fetch('resume.json'), fetch('data.json')
                ]);

                if (reqReport.ok) finalReport = await reqReport.text();
                if (reqResume.ok) finalResume = await reqResume.json();
                if (reqData.ok) globalDataArr = await reqData.json();
                
            } catch (e) {
                console.warn("Using fallback data. Local fetch failed, likely due to CORS.", e);
            }

            // Precompile static HTML parts (Report & Resume)
            precompiled.reportHtml = marked.parse(finalReport);
            precompiled.resumeHtml = buildResumeHtml(finalResume);
            
            if (isMobile) {
                currentPageIndex = 1; 
            }
            
            renderBook();
        }

        // --- DYNAMIC PAGINATION ENGINE ---
        // Alih-alih merender semua ke array, kita membuat HTML HANYA untuk halaman yang diminta.
        // Sangat cepat meski data mencapai 10.000++.

        function getTotalPages() {
            return TOTAL_STATIC_PAGES + (globalDataArr.length * 2);
        }

        function getPageHtml(index) {
            if (index < 0 || index >= getTotalPages()) return '';

            // Halaman Statis
            if (index === 0) return buildBlankPage();
            if (index === 1) return buildCoverPage();
            if (index === 2) return buildReportPage();
            if (index === 3) return buildResumeLayout();

            // Halaman Dinamis (Elemen Data)
            let dataIndex = Math.floor((index - TOTAL_STATIC_PAGES) / 2);
            let item = globalDataArr[dataIndex];
            
            if (!item) return `<div class="flex items-center justify-center h-full"><p class="text-slate-400">Data End</p></div>`;

            let isLeftPage = (index % 2 === 0);
            return isLeftPage ? buildElementMapPage(item, dataIndex) : buildElementChartPage(item, dataIndex);
        }

        function buildResumeHtml(resumeJson) {

            `).join('');

                    <span class="capitalize text-slate-600 dark:text-slate-400 w-16">${r.level}</span>

        function buildElementMapPage(item, index) {
            const mapId = `map-${item.id || index}`;
            const lat = item.location?.lat || 0;
            const lon = item.location?.lon || 0;
            
            const badges = (item.category || []).map(c => `<span class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded text-[10px] font-medium border border-slate-200 dark:border-slate-700 whitespace-nowrap">${c}</span>`).join('');
            const levelBadge = `<span class="px-2 py-1 bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 rounded text-[10px] font-bold border border-indigo-200 dark:border-indigo-800 uppercase flex items-center gap-1"><i data-lucide="network" class="w-3 h-3"></i> ${item.innovation_level || 'Unknown Level'}</span>`;
            const gemBadge = item.hidden_gem ? `<span class="px-2 py-1 bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300 rounded flex items-center gap-1 text-[10px] font-bold border border-amber-200 dark:border-amber-800"><i data-lucide="gem" class="w-3 h-3"></i> Hidden Gem</span>` : '';

            return `
                <div class="flex flex-col h-full overflow-y-auto scrollbar-thin pr-2">
                    <div class="mb-4">
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${levelBadge} ${gemBadge}
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-slate-900 dark:text-white leading-tight mb-2">${item.title}</h2>
                        <div class="flex flex-wrap gap-1.5 mb-2">
                            ${badges}
                        </div>
                    </div>
                    
                    <div class="w-full h-36 md:h-44 flex-shrink-0 rounded-xl bg-slate-200 dark:bg-slate-800 overflow-hidden mb-4 border border-slate-200 dark:border-slate-700 relative z-0">
                        <div id="${mapId}" class="w-full h-full leaflet-target" data-lat="${lat}" data-lon="${lon}"></div>
                    </div>

                    <div class="flex flex-col gap-3 flex-grow">
                        <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                            <h4 class="text-xs font-bold text-slate-800 dark:text-slate-200 uppercase mb-3 flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-2">
                                <i data-lucide="git-merge" class="w-4 h-4 text-indigo-500"></i> Nexus & Linkages
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs text-slate-600 dark:text-slate-400">
                                <div><strong class="text-slate-800 dark:text-slate-300 block mb-0.5">Source Knowledge:</strong> <span class="capitalize">${(item.origin?.knowledge_source || []).join(', ') || '-'}</span></div>
                                <div><strong class="text-slate-800 dark:text-slate-300 block mb-0.5">Geography Origin:</strong> ${item.location?.region || '-'}, ${item.location?.country || '-'}</div>
                                <div class="md:col-span-2">
                                    <strong class="text-slate-800 dark:text-slate-300 block mb-0.5">Reference Link:</strong> 
                                    ${item.source_url ? `<a href="${item.source_url}" target="_blank" rel="noopener noreferrer" class="text-blue-600 dark:text-blue-400 hover:underline break-all inline-flex items-center gap-1"><i data-lucide="external-link" class="w-3 h-3"></i> ${item.source_url}</a>` : 'No public link available'}
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 mt-auto">
                            <h4 class="text-xs font-bold text-slate-800 dark:text-slate-200 uppercase mb-3 flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-2">
                                <i data-lucide="copy" class="w-4 h-4 text-emerald-500"></i> Replicability & Deployment
                            </h4>
                            <div class="grid grid-cols-2 gap-4 text-xs">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-100 dark:border-slate-600">
                                        <i data-lucide="circle-dollar-sign" class="w-4 h-4 text-slate-500"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-slate-400 uppercase font-bold">Cost Level</p>
                                        <p class="font-medium text-slate-700 dark:text-slate-300 capitalize">${item.replicability?.cost_level || 'N/A'}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-100 dark:border-slate-600">
                                        <i data-lucide="hammer" class="w-4 h-4 text-slate-500"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-slate-400 uppercase font-bold">Difficulty</p>
                                        <p class="font-medium text-slate-700 dark:text-slate-300 capitalize">${item.replicability?.difficulty || 'N/A'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h-8"></div>
                </div>
            `;
        }

        function buildElementChartPage(item, index) {
            const chartId = `chart-${item.id || index}`;
            
            let rRisk = (item.risk_assessment?.risk_score || 0) * 10; 
            let rCost = item.replicability?.cost_level === 'low' ? 20 : (item.replicability?.cost_level === 'medium' ? 50 : 90);
            let rDiff = item.replicability?.difficulty === 'low' ? 20 : (item.replicability?.difficulty === 'medium' ? 50 : 90);
            let rImpact = item.impact?.scale === 'high' ? 90 : (item.impact?.scale === 'medium' ? 60 : 30);
            
            let processHtml = '<p class="text-xs text-slate-500 italic">No process data.</p>';
            if (item.process) {
                let steps = Array.isArray(item.process) ? item.process : (Array.isArray(item.process.how_it_works) ? item.process.how_it_works : null);
                if (steps) {
                    processHtml = `<ul class="list-decimal pl-4 space-y-1.5 text-xs text-slate-700 dark:text-slate-300">` + 
                        steps.map(p => `<li>${p}</li>`).join('') + `</ul>`;
                } else if (item.process.how_it_works) {
                    processHtml = `<p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed">${item.process.how_it_works}</p>`;
                }
            }

            let riskScoreNum = item.risk_assessment?.risk_score || 0;
            let riskTypesStr = (item.risk_assessment?.risk_type || []).map(t => `<span class="capitalize">${t}</span>`).join(' <span class="text-slate-400">&bull;</span> ');
            let riskBorderColor = riskScoreNum >= 7 ? 'border-red-600' : (riskScoreNum >= 4 ? 'border-amber-500' : 'border-blue-500');
            let riskTextColor = riskScoreNum >= 7 ? 'text-red-600 dark:text-red-400' : (riskScoreNum >= 4 ? 'text-amber-600 dark:text-amber-400' : 'text-blue-600 dark:text-blue-400');

            return `
                <div class="flex flex-col h-full overflow-y-auto scrollbar-thin pr-2">
                    <h3 class="text-sm font-bold text-slate-800 dark:text-white uppercase border-b border-slate-200 dark:border-slate-700 pb-2 mb-3 flex items-center gap-2 sticky top-0 bg-book-paper dark:bg-book-darkPaper z-10 pt-1">
                        <i data-lucide="cpu" class="w-4 h-4 text-slate-400"></i> Operation & Analysis
                    </h3>
                    
                    <p class="text-xs text-slate-600 dark:text-slate-300 mb-5 leading-relaxed bg-slate-50 dark:bg-slate-800 p-3 rounded-lg border border-slate-100 dark:border-slate-700 italic shadow-inner">
                        "${item.summary}"
                    </p>

                    <div class="w-full h-48 mb-6 flex-shrink-0 relative z-0">
                        <div id="${chartId}" class="w-full h-full echarts-target" 
                            data-title="${item.title}"
                            data-prio="${item.priority_score || 0}"
                            data-risk="${rRisk}"
                            data-cost="${rCost}"
                            data-diff="${rDiff}"
                            data-impact="${rImpact}">
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h4 class="text-xs font-bold text-slate-800 dark:text-slate-200 uppercase mb-2 flex items-center gap-2"><i data-lucide="list-tree" class="w-4 h-4 text-blue-500"></i> Process & Methodology</h4>
                            <div class="bg-slate-50 dark:bg-slate-800/30 p-3.5 rounded-lg border border-slate-100 dark:border-slate-700">
                                ${processHtml}
                            </div>
                        </div>

                        <div class="border-l-4 border-emerald-500 pl-3 py-1">
                            <div class="flex items-center gap-2 text-emerald-600 dark:text-emerald-400 font-bold text-xs mb-1.5 uppercase">
                                <i data-lucide="target" class="w-4 h-4"></i> Impact Target &mdash; 
                                <span class="bg-emerald-100 text-emerald-800 dark:bg-emerald-900/50 dark:text-emerald-300 px-1.5 py-0.5 rounded shadow-sm">${item.impact?.scale || 'N/A'} SCALE</span>
                            </div>
                            <p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed">${item.impact?.problem_solved || 'No impact data recorded.'}</p>
                        </div>

                        <div>
                            <h4 class="text-xs font-bold text-slate-800 dark:text-slate-200 uppercase mb-3 flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-1"><i data-lucide="shield-alert" class="w-4 h-4 text-red-500"></i> Risk Assessment</h4>
                            
                            <div class="border-l-[3px] ${riskBorderColor} pl-3 py-0.5">
                                <div class="flex flex-wrap items-center gap-1.5 ${riskTextColor} font-bold text-sm mb-1.5">
                                    <span>${riskScoreNum}/10</span> 
                                    ${riskTypesStr ? `<span class="text-slate-300 dark:text-slate-600">&bull;</span> ${riskTypesStr}` : ''}
                                </div>
                                <p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed">${item.risk_assessment?.explanation || 'No risk data available.'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h-8"></div>
                </div>
            `;
        }


        // --- Navigation Logic ---
        function updateIndicator() {
            let total = getTotalPages();
            let currentDisplay = isMobile ? currentPageIndex : (Math.floor(currentPageIndex / 2) * 2);
            let displayString = `Page ${currentDisplay} of ${total-1}`;
            
            if (!isMobile) {
                if (currentDisplay === 0) displayString = "Cover Page";
                else displayString = `Spread ${Math.floor(currentDisplay/2)} (${currentDisplay}-${currentDisplay+1})`;
            }

            document.getElementById('page-indicator').innerText = displayString;
        }

        function nextPage() {
            const step = isMobile ? 1 : 2;
            if (currentPageIndex + step < getTotalPages()) {
                currentPageIndex += step;
                renderBook();
            }
        }

        function prevPage() {
            const step = isMobile ? 1 : 2;
            if (currentPageIndex - step >= 0) {
                currentPageIndex -= step;
                if (isMobile && currentPageIndex === 0) {
                    currentPageIndex = 1;
                }
                renderBook();
            }
        }

        // --- Rendering Logic ---
        function renderBook() {
            const leftEl = document.getElementById('content-left');
            const rightEl = document.getElementById('content-right');

            cleanupInstances();

            if (isMobile) {
                rightEl.innerHTML = getPageHtml(currentPageIndex) || '';
                leftEl.innerHTML = '';
            } else {
                const leftIndex = Math.floor(currentPageIndex / 2) * 2;
                leftEl.innerHTML = getPageHtml(leftIndex) || '<div class="flex items-center justify-center h-full text-slate-300"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
                rightEl.innerHTML = getPageHtml(leftIndex + 1) || '<div class="flex items-center justify-center h-full text-slate-300"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
            }

            lucide.createIcons();
            
            setTimeout(() => {
                initVisibleMaps();
                initVisibleCharts();
            }, 100);

            updateIndicator();
        }

        // --- Print Logic ---
        function printCurrentView() {
            // Karena data bisa ribuan, sistem akan mencetak halaman (Spread) yang tampil di layar.
            // Memaksa render ribuan Leaflet/ECharts akan membuat browser crash.
            window.print();
        }

        // Resize observer untuk print
        window.addEventListener("beforeprint", () => {
            // Beri tahu ECharts untuk resize menyesuaikan kertas A4
            for (let id in chartInstances) {
                if(chartInstances[id]) chartInstances[id].resize();
            }
            // Beri tahu Leaflet untuk memastikan ubinnya dimuat
            for (let id in mapInstances) {
                if(mapInstances[id]) mapInstances[id].invalidateSize();
            }
        });


        // --- Visualizations Initialization ---
        function cleanupInstances() {
            for (let id in mapInstances) {
                if(mapInstances[id]) {
                    mapInstances[id].remove();
                    delete mapInstances[id];
                }
            }
            for (let id in chartInstances) {
                if(chartInstances[id] && !chartInstances[id].isDisposed()) {
                    chartInstances[id].dispose();
                    delete chartInstances[id];
                }
            }
        }

        function initVisibleMaps() {
            const targets = document.querySelectorAll('.leaflet-target');
            // Optimalisasi: Untuk data ribuan, map context (titik background abu2) dibatasi 
            // pengambilannya max 200 sampel agar peta tetap ringan saat berganti halaman.
            const sampleBgDots = globalDataArr.length > 200 ? globalDataArr.slice(0, 200) : globalDataArr;

            targets.forEach(el => {
                const id = el.id;
                const currentLat = parseFloat(el.getAttribute('data-lat'));
                const currentLon = parseFloat(el.getAttribute('data-lon'));
                
                if (id && !mapInstances[id]) {
                    const map = L.map(id, { zoomControl: false, scrollWheelZoom: false }).setView([currentLat, currentLon], 4);
                    
                    const isDark = document.documentElement.classList.contains('dark');
                    const tileUrl = isDark 
                        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

                    L.tileLayer(tileUrl, {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(map);

                    sampleBgDots.forEach(item => {
                        const lat = item.location?.lat;
                        const lon = item.location?.lon;
                        if(lat !== undefined && lon !== undefined && (lat !== currentLat || lon !== currentLon)) {
                            L.circleMarker([lat, lon], {
                                radius: 3,
                                color: isDark ? '#475569' : '#cbd5e1',
                                fillColor: isDark ? '#475569' : '#cbd5e1',
                                fillOpacity: 0.8,
                                weight: 1
                            }).addTo(map);
                        }
                    });

                    const markerHtml = `<div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-[0_0_10px_rgba(59,130,246,0.8)] animate-pulse"></div>`;
                    const customIcon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [16, 16], iconAnchor: [8, 8] });
                    L.marker([currentLat, currentLon], {icon: customIcon, zIndexOffset: 1000}).addTo(map);

                    mapInstances[id] = map;
                    setTimeout(() => { map.invalidateSize(); }, 50);
                }
            });
        }

        function initVisibleCharts() {
            const targets = document.querySelectorAll('.echarts-target');
            targets.forEach(el => {
                const id = el.id;
                if (id && !chartInstances[id]) {
                    const myChart = echarts.init(el);
                    const isDark = document.documentElement.classList.contains('dark');
                    const textColor = isDark ? '#cbd5e1' : '#475569';
                    
                    const prio = parseFloat(el.getAttribute('data-prio'));
                    const risk = parseFloat(el.getAttribute('data-risk'));
                    const cost = parseFloat(el.getAttribute('data-cost'));
                    const diff = parseFloat(el.getAttribute('data-diff'));
                    const impact = parseFloat(el.getAttribute('data-impact'));

                    const option = {
                        backgroundColor: 'transparent',
                        radar: {
                            indicator: [
                                { name: 'Priority', max: 100 },
                                { name: 'Impact', max: 100 },
                                { name: 'Risk', max: 100 },
                                { name: 'Cost', max: 100 },
                                { name: 'Difficulty', max: 100 }
                            ],
                            radius: '60%',
                            center: ['50%', '55%'],
                            splitNumber: 4,
                            axisName: { color: textColor, fontSize: 10, fontWeight: 'bold' },
                            splitArea: {
                                areaStyle: { color: isDark ? ['#1e293b', '#0f172a'] : ['#f8fafc', '#f1f5f9'] }
                            },
                            splitLine: {
                                lineStyle: { color: isDark ? '#334155' : '#e2e8f0' }
                            },
                            axisLine: {
                                lineStyle: { color: isDark ? '#334155' : '#e2e8f0' }
                            }
                        },
                        series: [{
                            type: 'radar',
                            data: [
                                {
                                    value: [prio, impact, risk, cost, diff],
                                    name: 'Metrics',
                                    itemStyle: { color: '#3b82f6' },
                                    areaStyle: { color: 'rgba(59, 130, 246, 0.3)' },
                                    lineStyle: { width: 2 }
                                }
                            ]
                        }]
                    };
                    
                    myChart.setOption(option);
                    chartInstances[id] = myChart;
                    setTimeout(() => { myChart.resize(); }, 50);
                }
            });
        }

        // --- Theme Management ---
        function checkTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
            renderBook(); 
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
