<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Innovation Intelligence Book</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        book: {
                            paper: '#fcfcfc',
                            darkPaper: '#1e293b',
                            cover: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'book-left': '-10px 10px 30px rgba(0,0,0,0.1), inset -2px 0 10px rgba(0,0,0,0.05)',
                        'book-right': '10px 10px 30px rgba(0,0,0,0.1), inset 2px 0 10px rgba(0,0,0,0.05)',
                        'book-mobile': '0 10px 30px rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        /* A4 Aspect Ratio 1 : 1.414 */
        .a4-page {
            aspect-ratio: 1 / 1.414;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            background-color: var(--tw-bg-opacity, 1);
        }
        
        .a4-page::-webkit-scrollbar {
            width: 4px;
        }
        .a4-page::-webkit-scrollbar-track {
            background: transparent;
        }
        .a4-page::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .dark .a4-page::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        /* Book Binding Effect */
        .binding-left { background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%); }
        .dark .binding-left { background: linear-gradient(to right, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%); }
        .binding-right { background: linear-gradient(to left, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 90%, rgba(0,0,0,0.1) 100%); }
        .dark .binding-right { background: linear-gradient(to left, rgba(30,41,59,0) 0%, rgba(0,0,0,0.2) 90%, rgba(0,0,0,0.4) 100%); }

        /* Markdown Styles */
        .prose h1 { font-size: 1.875rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; }
        .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; color: #1e293b; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .dark .prose h1, .dark .prose h2 { color: #f8fafc; border-color: #334155; }
        .dark .prose p, .dark .prose li { color: #cbd5e1; }
        
        .page-transition { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }

        /* --- PRINT STYLES FOR PREMIUM CONTINUOUS AESTHETICS --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm 20mm; /* Margin buku profesional */
            }
            body {
                background: white !important;
                color: #0f172a !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                overflow: visible !important;
            }
            
            #main-nav, #main-content, #data-upload-modal, #print-loading, .no-print {
                display: none !important;
            }

            #print-wrapper {
                display: block !important;
                width: 100% !important;
                background: white !important;
                position: relative !important;
                opacity: 1 !important;
            }

            /* Hapus paksaan potongan halaman agar data mengalir lurus */
            .print-flow {
                display: block !important;
                width: 100%;
                background: white !important;
                position: relative !important;
                box-sizing: border-box;
            }

            /* Paksa pindah halaman KHUSUS untuk pergantian bab (Cover, Report, Data) */
            .page-break {
                page-break-after: always;
                break-after: page;
            }

            /* Utilitas pencegah kotak data terpotong di tengah jalan saat pindah halaman */
            .break-avoid {
                page-break-inside: avoid;
                break-inside: avoid;
            }

            .print-leaflet-target { 
                border: 2px solid #e2e8f0 !important; 
                border-radius: 12px !important; 
                width: 100% !important; 
                max-width: 100% !important;
                display: block; 
                box-sizing: border-box !important;
                box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            }
            .print-echarts-target { 
                width: 100% !important; 
                max-width: 100% !important;
                display: block; 
                box-sizing: border-box !important;
            }
        }

        input[type="file"]::file-selector-button {
            border: 1px solid #cbd5e1; padding: 0.25rem 0.75rem; border-radius: 0.375rem;
            background-color: #f8fafc; color: #334155; cursor: pointer;
            transition: all 0.2s ease-in-out; font-size: 0.75rem; font-weight: 600; margin-right: 1rem;
        }
        .dark input[type="file"]::file-selector-button { border-color: #475569; background-color: #1e293b; color: #cbd5e1; }
        input[type="file"]::file-selector-button:hover { background-color: #e2e8f0; }
        .dark input[type="file"]::file-selector-button:hover { background-color: #334155; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 font-sans antialiased min-h-screen flex flex-col">

    <!-- Manual Data Upload Modal -->
    <div id="data-upload-modal" class="fixed inset-0 bg-slate-900/90 z-[10000] hidden flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-lg w-full p-6 sm:p-8 border border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3 mb-6 text-blue-600 dark:text-blue-400">
                <i data-lucide="folder-open" class="w-8 h-8"></i>
                <h2 class="text-xl font-bold text-slate-800 dark:text-white">Pemuat Data Lokal</h2>
            </div>
            <p class="text-sm text-slate-600 dark:text-slate-300 mb-6 leading-relaxed">
                Sistem tidak dapat membaca file secara otomatis. <br/><strong>Silakan masukkan file Anda secara manual untuk melanjutkan.</strong>
            </p>
            
            <div class="space-y-4 mb-8">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">1. Pilih data.json (Wajib)</label>
                    <input type="file" id="upload-data" accept=".json" class="w-full text-sm text-slate-500 dark:text-slate-400">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">2. Pilih resume.json (Wajib)</label>
                    <input type="file" id="upload-resume" accept=".json" class="w-full text-sm text-slate-500 dark:text-slate-400">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">3. Pilih report.md (Opsional)</label>
                    <input type="file" id="upload-report" accept=".md,.txt" class="w-full text-sm text-slate-500 dark:text-slate-400">
                </div>
            </div>

            <button onclick="processLocalUploads()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors flex items-center justify-center gap-2">
                <i data-lucide="play" class="w-4 h-4"></i> Susun Buku Sekarang
            </button>
        </div>
    </div>

    <!-- Print Loading Overlay -->
    <div id="print-loading" class="fixed inset-0 bg-slate-900/95 z-[9999] hidden flex-col items-center justify-center text-white backdrop-blur-sm">
        <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4 text-blue-400"></i>
        <h2 class="text-2xl font-bold mb-2">Menyiapkan Dokumen PDF...</h2>
        <p class="text-slate-300 text-center max-w-md">Menyusun estetika A4 profesional, memuat kanvas grafik,<br/>dan mengatur struktur baca. Mohon tunggu...</p>
    </div>

    <!-- Container Khusus Untuk Print Semua Halaman -->
    <div id="print-wrapper" class="hidden absolute top-0 left-0 w-full bg-white z-0 opacity-0 print:opacity-100 print:relative"></div>

    <!-- Navbar & Controls -->
    <nav id="main-nav" class="fixed top-0 w-full bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 z-50 transition-colors no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="book-open" class="text-blue-600 dark:text-blue-400 w-6 h-6"></i>
                <span class="font-bold text-lg tracking-tight hidden sm:block">Intelligence Book</span>
                
                <select id="toc-dropdown" onchange="jumpToPage(this.value)" class="ml-2 text-xs border rounded p-1.5 min-w-[140px] max-w-[150px] md:max-w-[200px] truncate bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 outline-none text-slate-700 dark:text-slate-200 cursor-pointer hover:border-blue-400 transition-colors shadow-inner">
                    <option value="" disabled selected>Daftar Isi...</option>
                </select>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <span id="page-indicator" class="text-xs sm:text-sm font-medium text-slate-500 dark:text-slate-400 font-mono hidden md:inline-block w-24 text-right">Page 1 / ?</span>
                
                <button onclick="printAllAsPDF()" class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-all flex items-center gap-2 border border-indigo-200 dark:border-indigo-800 shadow-sm" title="Cetak Seluruh Buku ke PDF">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                    <span class="text-xs font-bold uppercase hidden md:inline-block">Cetak PDF Laporan</span>
                </button>

                <div class="flex bg-slate-100 dark:bg-slate-900 rounded-lg p-1">
                    <button onclick="prevPage()" class="p-2 rounded hover:bg-white dark:hover:bg-slate-700 shadow-sm transition-all">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <button onclick="nextPage()" class="p-2 rounded hover:bg-white dark:hover:bg-slate-700 shadow-sm transition-all">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-all text-slate-600 dark:text-slate-300">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Book Container -->
    <main id="main-content" class="flex-grow flex items-center justify-center p-4 sm:p-8 pt-24 pb-12 w-full no-print hidden">
        <div id="book-wrapper" class="relative flex w-full max-w-6xl justify-center items-stretch perspective-1000 gap-0 sm:gap-1 lg:gap-0">
            <!-- Left Page -->
            <div id="page-left" class="hidden md:block w-1/2 bg-book-paper dark:bg-book-darkPaper shadow-book-left rounded-l-md relative a4-page page-transition transform origin-right">
                <div class="absolute inset-y-0 right-0 w-12 binding-left pointer-events-none z-10"></div>
                <div class="p-8 lg:p-12 h-full flex flex-col relative" id="content-left"></div>
            </div>
            <!-- Right Page -->
            <div id="page-right" class="w-full md:w-1/2 max-w-md md:max-w-none bg-book-paper dark:bg-book-darkPaper shadow-book-mobile md:shadow-book-right rounded-md md:rounded-l-none md:rounded-r-md relative a4-page page-transition transform origin-left">
                <div class="hidden md:block absolute inset-y-0 left-0 w-12 binding-right pointer-events-none z-10"></div>
                <div class="p-6 sm:p-8 lg:p-12 h-full flex flex-col relative" id="content-right"></div>
            </div>
        </div>
    </main>

    <script>
        const fallbackData = []; 
        const fallbackResume = [{"global_summary": {"total_innovations": 0, "grassroots_percentage": 0}}];
        const fallbackReport = `# Data Belum Dimuat\nSilakan pastikan file Anda terbaca dengan baik.`;

        let currentPageIndex = 0; 
        let isMobile = window.innerWidth < 768;
        let mapInstances = {};
        let chartInstances = {};
        let printMapInstances = {};
        let printChartInstances = {};
        let globalDataArr = []; 
        let precompiled = { reportHtml: "", resumeHtml: "" };
        const TOTAL_STATIC_PAGES = 4;

        async function initApp() {
            lucide.createIcons();
            checkTheme();
            
            window.addEventListener('resize', () => {
                const newIsMobile = window.innerWidth < 768;
                if (newIsMobile !== isMobile) {
                    isMobile = newIsMobile;
                    if (!isMobile && currentPageIndex % 2 !== 0 && currentPageIndex > 0) {
                        currentPageIndex--;
                    }
                    if(globalDataArr.length > 0) renderBook();
                }
            });

            let fetchSuccess = false;
            try {
                const [reqReport, reqResume, reqData] = await Promise.all([
                    fetch('report.md').catch(()=>null), 
                    fetch('resume.json').catch(()=>null), 
                    fetch('data.json').catch(()=>null)
                ]);

                if (reqData && reqData.ok && reqResume && reqResume.ok) {
                    let rpt = reqReport && reqReport.ok ? await reqReport.text() : fallbackReport;
                    let rsm = await reqResume.json();
                    let dta = await reqData.json();
                    
                    startBookEngine(rpt, rsm, dta);
                    fetchSuccess = true;
                }
            } catch (e) {
                console.warn("Fetch failed.", e);
            }

            if (!fetchSuccess) {
                document.getElementById('data-upload-modal').classList.remove('hidden');
                document.getElementById('data-upload-modal').classList.add('flex');
            }
        }

        async function processLocalUploads() {
            const dataFile = document.getElementById('upload-data').files[0];
            const resumeFile = document.getElementById('upload-resume').files[0];
            const reportFile = document.getElementById('upload-report').files[0];

            if (!dataFile || !resumeFile) {
                alert("Mohon pilih file data.json dan resume.json terlebih dahulu!");
                return;
            }

            try {
                const readAsText = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = e => reject(e);
                    reader.readAsText(file);
                });

                const dataContent = await readAsText(dataFile);
                const resumeContent = await readAsText(resumeFile);
                const reportContent = reportFile ? await readAsText(reportFile) : fallbackReport;

                const parsedData = JSON.parse(dataContent);
                const parsedResume = JSON.parse(resumeContent);

                document.getElementById('data-upload-modal').classList.add('hidden');
                document.getElementById('data-upload-modal').classList.remove('flex');
                
                startBookEngine(reportContent, parsedResume, parsedData);
            } catch (error) {
                alert("Terjadi kesalahan saat membaca file JSON.\nDetail: " + error.message);
            }
        }

        function startBookEngine(reportStr, resumeObj, dataArr) {
            document.getElementById('main-content').classList.remove('hidden');
            globalDataArr = dataArr;
            precompiled.reportHtml = marked.parse(reportStr);
            precompiled.resumeHtml = buildResumeHtml(resumeObj);
            buildDropdownMenu();
            if (isMobile) currentPageIndex = 1; 
            renderBook();
        }

        function buildDropdownMenu() {
            const dropdown = document.getElementById('toc-dropdown');
            let html = `<option value="" disabled selected>Daftar Isi...</option>
                        <option value="1">Sampul Depan</option>
                        <option value="2">Laporan Eksekutif</option>
                        <option value="3">Metrik Global</option>`;
            
            let grouped = {};
            globalDataArr.forEach((item, idx) => {
                let country = item.location?.country || 'Lainnya';
                if(!grouped[country]) grouped[country] = [];
                grouped[country].push({ title: item.title, idx: idx });
            });

            for(let country in grouped) {
                html += `<optgroup label="📍 ${country}">`;
                grouped[country].forEach(item => {
                    let pageIdx = TOTAL_STATIC_PAGES + (item.idx * 2);
                    html += `<option value="${pageIdx}">${item.title}</option>`;
                });
                html += `</optgroup>`;
            }
            dropdown.innerHTML = html;
        }

        function jumpToPage(val) {
            if(!val) return;
            currentPageIndex = parseInt(val);
            if (!isMobile && currentPageIndex % 2 !== 0 && currentPageIndex > 0) {
                currentPageIndex--;
            }
            renderBook();
            document.getElementById('toc-dropdown').selectedIndex = 0;
        }

        function getTotalPages() {
            return TOTAL_STATIC_PAGES + (globalDataArr.length * 2);
        }

        function getPageHtml(index, isPrint = false) {
            if (index < 0 || index >= getTotalPages()) return '';

            if (index === 0) return buildBlankPage(isPrint);
            if (index === 1) return buildCoverPage(isPrint);
            if (index === 2) return buildReportPage(isPrint);
            if (index === 3) return buildResumeLayout(isPrint);

            let dataIndex = Math.floor((index - TOTAL_STATIC_PAGES) / 2);
            let item = globalDataArr[dataIndex];
            
            if (!item) return `<div class="flex items-center justify-center h-full"><p class="text-slate-400">Data End</p></div>`;

            let isLeftPage = (index % 2 === 0);
            return isLeftPage ? buildElementMapPage(item, dataIndex, isPrint) : buildElementChartPage(item, dataIndex, isPrint);
        }

        // --- HTML Builders ---
        function buildBlankPage(isPrint) {
            if(isPrint) return ''; 
            return `
                <div class="flex flex-col items-center justify-center h-full opacity-40">
                    <i data-lucide="shield-check" class="w-12 h-12 mb-4 text-slate-300 dark:text-slate-600"></i>
                    <p class="text-[10px] font-mono text-slate-400 dark:text-slate-500 uppercase tracking-widest text-center px-8">Halaman ini sengaja<br/>dikosongkan</p>
                </div>
            `;
        }

        function buildCoverPage(isPrint) {
            if (isPrint) {
                return `
                    <div class="flex flex-col items-center justify-center text-center h-full min-h-[250mm] border-[12px] border-double border-slate-200 rounded-3xl p-12 bg-white relative break-avoid shadow-inner">
                        <div class="w-28 h-28 bg-blue-600 rounded-3xl flex items-center justify-center shadow-xl shadow-blue-500/20 mb-8 border-4 border-white">
                            <i data-lucide="globe-2" class="text-white w-14 h-14"></i>
                        </div>
                        <h1 class="text-5xl font-black text-slate-900 uppercase tracking-widest mb-6 leading-tight">Innovation<br/>Intelligence<br/>Radar</h1>
                        <div class="w-24 h-1.5 bg-blue-600 rounded-full my-8"></div>
                        <p class="text-slate-500 font-bold text-lg uppercase tracking-[0.3em] mb-16">Digital Briefing Book</p>
                        
                        <div class="absolute bottom-16 w-full text-center">
                            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Global Report Edition &mdash; 2026</p>
                            <p class="text-[10px] text-slate-300 mt-2 font-mono">Generated by Intelligence AI Framework</p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex flex-col items-center justify-center h-full text-center space-y-6">
                    <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center shadow-lg shadow-blue-500/30 mx-auto">
                        <i data-lucide="globe-2" class="text-white w-12 h-12"></i>
                    </div>
                    <h1 class="text-4xl font-black text-slate-800 dark:text-white uppercase tracking-wider mt-6 leading-tight">Innovation<br/>Intelligence<br/>Radar</h1>
                    <div class="w-16 h-1 bg-blue-500 rounded-full my-6 mx-auto"></div>
                    <p class="text-slate-500 dark:text-slate-400 font-mono text-sm uppercase tracking-widest">Digital Briefing Book</p>
                    <p class="text-xs text-slate-400 mt-12 pt-12">Vol. 1 &mdash; 2026</p>
                </div>
            `;
        }

        function buildReportPage(isPrint) {
            if(isPrint) {
                return `
                    <div class="break-avoid bg-white p-10 rounded-3xl border border-slate-200 shadow-sm min-h-[250mm]">
                        <div class="flex items-center gap-3 mb-8 text-blue-700 pb-4 border-b-2 border-slate-100">
                            <i data-lucide="file-text" class="w-8 h-8"></i>
                            <h3 class="font-black uppercase tracking-[0.2em] text-xl">Executive Report</h3>
                        </div>
                        <div class="prose prose-slate prose-lg max-w-none text-slate-800 leading-relaxed">
                            ${precompiled.reportHtml}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="overflow-y-auto scrollbar-thin pr-2 h-full">
                    <div class="flex items-center gap-2 mb-6 text-blue-600 dark:text-blue-400 pb-4 border-b border-slate-200 dark:border-slate-700">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                        <h3 class="font-bold uppercase tracking-widest text-xs">Executive Report</h3>
                    </div>
                    <div class="prose dark:prose-invert max-w-none text-sm">
                        ${precompiled.reportHtml}
                    </div>
                </div>
            `;
        }

        function buildResumeHtml(resumeJson) {
            const resume = Array.isArray(resumeJson) ? resumeJson[0] : resumeJson;
            let catsHtml = (resume.top_categories || []).map(c => `
                <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl mb-2.5 border border-slate-200 dark:border-slate-700 print:bg-slate-50 print:border-slate-200 print:shadow-sm">
                    <span class="text-sm font-bold truncate pr-4 text-slate-700 dark:text-slate-300 print:text-slate-800">${c.category}</span>
                    <span class="bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 print:bg-blue-100 print:text-blue-800 px-3 py-1 rounded-md text-xs font-black shadow-sm">${c.count}</span>
                </div>
            `).join('');

            let riskDistHtml = (resume.risk_distribution || []).map(r => {
                let color = r.level === 'high' ? 'bg-red-500 print:bg-red-500' : (r.level === 'medium' ? 'bg-amber-500 print:bg-amber-500' : 'bg-emerald-500 print:bg-emerald-500');
                let maxRisk = Math.max(...(resume.risk_distribution || []).map(x=>x.count), 60);
                return `
                <div class="flex items-center justify-between text-sm mb-2.5">
                    <span class="capitalize font-bold text-slate-600 dark:text-slate-400 print:text-slate-700 w-20">${r.level}</span>
                    <div class="flex-1 mx-3 h-2.5 bg-slate-200 dark:bg-slate-700 print:bg-slate-200 rounded-full overflow-hidden shadow-inner">

        function buildElementChartPage(item, index, isPrint) {

            let rImpact = item.impact?.scale === 'high' ? 90 : (item.impact?.scale === 'medium' ? 60 : 30);
            
            let processHtml = '<p class="text-sm text-slate-500 italic">No process data.</p>';
            let webProcessHtml = '<p class="text-xs text-slate-500 italic">No process data.</p>';
            
            if (item.process) {
                let htmlPartsPrint = [];
                let htmlPartsWeb = [];
                
                if (item.process.how_it_works) {
                    if (Array.isArray(item.process.how_it_works)) {
                        htmlPartsPrint.push(`<ul class="list-disc pl-5 space-y-1.5 text-sm text-slate-800 print:text-slate-800 font-medium">` + item.process.how_it_works.map(p => `<li>${p}</li>`).join('') + `</ul>`);

                    } else if (typeof item.process.how_it_works === 'string') {
                        htmlPartsPrint.push(`<p class="text-sm text-slate-800 print:text-slate-800 font-medium leading-relaxed">${item.process.how_it_works}</p>`);
                        htmlPartsWeb.push(`<p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed">${item.process.how_it_works}</p>`);
                    }
                }
                
                if (item.process.materials_used && Array.isArray(item.process.materials_used) && item.process.materials_used.length > 0) {

                if (item.process.step_by_step && Array.isArray(item.process.step_by_step) && item.process.step_by_step.length > 0) {

                            data-cost="${rCost}"
                            data-diff="${rDiff}"
                            data-impact="${rImpact}">

                    <div class="space-y-4 flex-grow min-h-0">

        function updateIndicator() {
            let total = getTotalPages();
            let currentDisplay = isMobile ? currentPageIndex : (Math.floor(currentPageIndex / 2) * 2);
            let displayString = `Page ${currentDisplay} of ${total-1}`;
            
            if (!isMobile) {
                if (currentDisplay === 0) displayString = "Cover Page";
                else displayString = `Spread ${Math.floor(currentDisplay/2)} (${currentDisplay}-${currentDisplay+1})`;
            }
            document.getElementById('page-indicator').innerText = displayString;
        }

        function nextPage() {
            const step = isMobile ? 1 : 2;
            if (currentPageIndex + step < getTotalPages()) {
                currentPageIndex += step;
                renderBook();
            }
        }

        function prevPage() {
            const step = isMobile ? 1 : 2;
            if (currentPageIndex - step >= 0) {
                currentPageIndex -= step;
                if (isMobile && currentPageIndex === 0) currentPageIndex = 1;
                renderBook();
            }
        }

        // --- View Rendering ---
        function renderBook() {
            const leftEl = document.getElementById('content-left');
            const rightEl = document.getElementById('content-right');

            cleanupInstances(mapInstances, chartInstances);

            if (isMobile) {
                rightEl.innerHTML = getPageHtml(currentPageIndex, false) || '';
                leftEl.innerHTML = '';
            } else {
                const leftIndex = Math.floor(currentPageIndex / 2) * 2;
                leftEl.innerHTML = getPageHtml(leftIndex, false) || '<div class="flex items-center justify-center h-full text-slate-300"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
                rightEl.innerHTML = getPageHtml(leftIndex + 1, false) || '<div class="flex items-center justify-center h-full text-slate-300"><i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i></div>';
            }

            lucide.createIcons();
            
            setTimeout(() => {
                initVisualizations('.leaflet-target', '.echarts-target', mapInstances, chartInstances, false);
            }, 50);
            
            setTimeout(() => {
                for (let id in mapInstances) {
                    if(mapInstances[id]) mapInstances[id].invalidateSize();
                }
            }, 300);

            updateIndicator();
        }

        // --- PRINT ENGINE ---
        async function printAllAsPDF() {
            const loading = document.getElementById('print-loading');
            const printWrapper = document.getElementById('print-wrapper');
            const mainNav = document.getElementById('main-nav');
            const mainContent = document.getElementById('main-content');
            
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            
            mainNav.style.display = 'none';
            mainContent.style.display = 'none';
            
            // KUNCI PERBAIKAN: Batasi lebar wrapper secara fisik menyamai area cetak kertas A4
            // Kertas A4 = 210mm. Margin Kiri-Kanan (20mm + 20mm) = 40mm. Area bersih = 170mm.
            printWrapper.className = 'bg-white relative block mx-auto';
            printWrapper.style.width = '170mm'; 
            
            await new Promise(r => setTimeout(r, 100)); 

            try {
                let fullHtml = '';
                
                // --- CONTINUOUS FLOW LOGIC ---
                // Cover
                fullHtml += `<div class="print-flow page-break">${getPageHtml(1, true)}</div>`;
                // Laporan Eksekutif
                fullHtml += `<div class="print-flow page-break">${getPageHtml(2, true)}</div>`;
                // Metrik Global
                fullHtml += `<div class="print-flow page-break">${getPageHtml(3, true)}</div>`;
                
                // Data Inovasi (Menyatu tanpa putus halaman paksa, kecuali saat tidak muat)
                let total = getTotalPages();
                for(let i = 4; i < total; i+=2) {
                    let leftPart = getPageHtml(i, true);
                    let rightPart = getPageHtml(i+1, true);
                    
                    fullHtml += `
                        <div class="print-flow mb-16 pb-12 border-b-[6px] border-slate-100">
                            ${leftPart}
                            ${rightPart}
                        </div>
                    `;
                }
                
                printWrapper.innerHTML = fullHtml;
                lucide.createIcons();

                cleanupInstances(printMapInstances, printChartInstances);

                initVisualizations('.print-leaflet-target', '.print-echarts-target', printMapInstances, printChartInstances, true);

                for (let id in printChartInstances) {
                    if(printChartInstances[id]) printChartInstances[id].resize();
                }
                for (let id in printMapInstances) {
                    if(printMapInstances[id]) printMapInstances[id].invalidateSize();
                }

                await new Promise(r => setTimeout(r, 2500));
                
                const finishPrint = () => {
                    printWrapper.innerHTML = ''; 
                    printWrapper.style.width = ''; // Reset lebar kembali normal setelah print
                    printWrapper.className = 'hidden absolute top-0 left-0 w-full bg-white z-0 opacity-0 print:opacity-100 print:relative';
                    mainNav.style.display = '';
                    mainContent.style.display = '';
                    cleanupInstances(printMapInstances, printChartInstances);
                    loading.classList.add('hidden');
                    loading.classList.remove('flex');
                    window.removeEventListener('afterprint', finishPrint);
                };

                window.addEventListener('afterprint', finishPrint);
                
                window.print();

                setTimeout(() => {
                    if (!loading.classList.contains('hidden')) {
                        finishPrint();
                    }
                }, 8000);

            } catch(e) {
                console.error("Gagal membuat PDF", e);
                alert("Terjadi kesalahan saat menyusun PDF.");
                loading.classList.add('hidden');
                loading.classList.remove('flex');
            }
        }

        // --- Visualizations Initialization ---
        function cleanupInstances(mapsObj, chartsObj) {
            for (let id in mapsObj) {
                if(mapsObj[id]) {
                    mapsObj[id].remove();
                    delete mapsObj[id];
                }
            }
            for (let id in chartsObj) {
                if(chartsObj[id] && !chartsObj[id].isDisposed()) {
                    chartsObj[id].dispose();
                    delete chartsObj[id];
                }
            }
        }

        function initVisualizations(mapClass, chartClass, mapsObj, chartsObj, isPrint) {
            const mapTargets = document.querySelectorAll(mapClass);
            const sampleBgDots = globalDataArr.length > 100 ? globalDataArr.slice(0, 100) : globalDataArr;
            const isDark = document.documentElement.classList.contains('dark') && !isPrint; 

            mapTargets.forEach(el => {
                const id = el.id;
                
                const rawLat = parseFloat(el.getAttribute('data-lat'));
                const rawLon = parseFloat(el.getAttribute('data-lon'));
                const currentLat = isNaN(rawLat) ? 0 : rawLat;
                const currentLon = isNaN(rawLon) ? 0 : rawLon;
                
                if (id && !mapsObj[id]) {
                    const mapOptions = isPrint ? 
                        { zoomControl: false, scrollWheelZoom: false, fadeAnimation: false, zoomAnimation: false, markerZoomAnimation: false, attributionControl: false } : 
                        { zoomControl: false, scrollWheelZoom: false };

                    const map = L.map(id, mapOptions).setView([currentLat, currentLon], 4);
                    
                    const tileUrl = isDark 
                        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

                    L.tileLayer(tileUrl, { attribution: '&copy; OpenStreetMap' }).addTo(map);

                    sampleBgDots.forEach(item => {
                        const lat = parseFloat(item.location?.lat);
                        const lon = parseFloat(item.location?.lon);
                        
                        if(!isNaN(lat) && !isNaN(lon) && (lat !== currentLat || lon !== currentLon)) {
                            L.circleMarker([lat, lon], {
                                radius: 3, color: isDark ? '#475569' : '#cbd5e1', fillColor: isDark ? '#475569' : '#cbd5e1', fillOpacity: 0.8, weight: 1
                            }).addTo(map);
                        }
                    });

                    const markerHtml = `<div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-[0_0_10px_rgba(59,130,246,0.8)] ${isPrint ? '' : 'animate-pulse'}"></div>`;
                    const customIcon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [16, 16], iconAnchor: [8, 8] });
                    L.marker([currentLat, currentLon], {icon: customIcon, zIndexOffset: 1000}).addTo(map);

                    mapsObj[id] = map;
                }
            });

            const chartTargets = document.querySelectorAll(chartClass);
            chartTargets.forEach(el => {
                const id = el.id;
                if (id && !chartsObj[id]) {
                    const myChart = echarts.init(el);
                    const textColor = isDark ? '#cbd5e1' : '#475569';
                    
                    const prio = parseFloat(el.getAttribute('data-prio'));
                    const risk = parseFloat(el.getAttribute('data-risk'));
                    const cost = parseFloat(el.getAttribute('data-cost'));
                    const diff = parseFloat(el.getAttribute('data-diff'));
                    const impact = parseFloat(el.getAttribute('data-impact'));

                    myChart.setOption({
                        animation: !isPrint, 
                        backgroundColor: 'transparent',
                        radar: {
                            indicator: [
                                { name: 'Priority', max: 100 },
                                { name: 'Impact', max: 100 },
                                { name: 'Risk', max: 100 },
                                { name: 'Cost', max: 100 },
                                { name: 'Difficulty', max: 100 }
                            ],
                            radius: '65%',
                            center: ['50%', '50%'],
                            splitNumber: 4,
                            axisName: { color: isPrint ? '#0f172a' : textColor, fontSize: isPrint ? 12 : 10, fontWeight: 'bold' },
                            splitArea: { areaStyle: { color: isDark ? ['#1e293b', '#0f172a'] : ['#f8fafc', '#f1f5f9'] } },
                            splitLine: { lineStyle: { color: isDark ? '#334155' : '#e2e8f0', width: isPrint ? 2 : 1 } },
                            axisLine: { lineStyle: { color: isDark ? '#334155' : '#e2e8f0' } }
                        },
                        series: [{
                            type: 'radar',
                            data: [{
                                value: [prio, impact, risk, cost, diff],
                                name: 'Metrics',
                                itemStyle: { color: '#3b82f6' },
                                areaStyle: { color: 'rgba(59, 130, 246, 0.4)' },
                                lineStyle: { width: 3 }
                            }]
                        }]
                    });
                    chartsObj[id] = myChart;
                }
            });
        }

        // --- Theme Management ---
        function checkTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
            if(globalDataArr.length > 0) renderBook(); 
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
